[pytest]
DJANGO_SETTINGS_MODULE = qr_attendance.settings.development
python_files = tests.py test_*.py *_test.py
addopts = -v --tb=short
testpaths = 
    core/tests
    attendance/tests
    admin_portal/tests
    teacher_portal/tests
    qr_generator/tests

[coverage:run]
source = .
omit = 
    */migrations/*
    */tests/*
    venv/*
    manage.py
    */settings/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
